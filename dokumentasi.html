<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokumentasi - SIMASTA</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>
  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img
            src="assets/logo-sidebar.png"
            alt="Logo Simasta"
            class="sidebar-logo-img"
          />
        </div>

        <nav class="sidebar-menu">
          <a href="dashboard.html" class="menu-item">
            <i class="bi bi-grid-fill"></i> Dashboard
          </a>
          <a href="kegiatan.html" class="menu-item">
            <i class="bi bi-calendar-event"></i> Kegiatan
          </a>
          <a href="peserta.html" class="menu-item">
            <i class="bi bi-people"></i> Peserta
          </a>
          <a href="kegiatan-peserta.html" class="menu-item">
            <i class="bi bi-person-check"></i> Kegiatan Peserta
          </a>
          <a href="dokumentasi.html" class="menu-item active">
            <i class="bi bi-image"></i> Dokumentasi
          </a>
        </nav>

        <a href="index.html" class="menu-item logout-item">
          <i class="bi bi-box-arrow-left"></i> Keluar
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- TOPBAR -->
        <div class="topbar"></div>

        <!-- TOOLBAR -->
        <div class="page-toolbar">
          <select class="filter-select" id="filterKegiatan">
            <select class="filter-select" id="filterKegiatan">
              <option value="Semua kegiatan"></option>
            </select>
          </select>

          <select class="filter-select" id="filterTipe">
            <option value="Semua tipe">Semua tipe</option>
            <option value="JPG">JPG</option>
            <option value="PNG">PNG</option>
            <option value="PDF">PDF</option>
          </select>

          <button
            class="btn-add ms-auto"
            data-bs-toggle="modal"
            data-bs-target="#modalUploadDokumentasi"
          >
            <i class="bi bi-upload"></i> Upload dokumentasi
          </button>
        </div>

        <!-- GRID DOKUMENTASI -->
        <div class="dokumentasi-grid" style="margin-top: 24px">
        </div>
      </main>
    </div>

    <!--  MODAL UPLOAD DOKUMENTASI  -->
    <div class="modal fade" id="modalUploadDokumentasi" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="modal-title-custom">Upload dokumentasi</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <form
              action="php/kegiatan/proses_upload_dokumentasi.php"
              method="POST"
              enctype="multipart/form-data"
            >
              <div class="mb-3">
                <label class="form-label-custom">Pilih kegiatan</label>
                <select
                  name="id_kegiatan"
                  class="form-control-custom"
                  id="uploadKegiatanSelect"
                  required
                >
                  <option value=""></option>
                </select>
              </div>
              <div class="mb-4">
                <label class="form-label-custom">File dokumentasi</label>
                <label for="fileUpload" class="upload-area d-block">
                  <i class="bi bi-cloud-arrow-up"></i>
                  Klik untuk pilih file (foto / PDF)
                </label>
                <input
                  type="file"
                  name="file_dokumentasi"
                  id="fileUpload"
                  class="d-none"
                  required
                />
              </div>
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn-cancel"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-upload"></i> Upload
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL HAPUS DOKUMENTASI UNIVERSAL -->
    <div class="modal fade" id="modalHapusDok" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal text-center">
          <div class="modal-body py-4">
            <div class="hapus-icon-circle"><i class="bi bi-trash"></i></div>
            <h5 class="modal-title-custom mb-2">Hapus file?</h5>
            <p class="text-muted-custom mb-4" id="hapusDokText">
              "nama_file" akan dihapus permanen.
            </p>
            <div class="d-flex justify-content-center gap-2">
              <button type="button" class="btn-cancel" data-bs-dismiss="modal">
                Batal
              </button>
              <a href="#" id="hapusDokLink" class="btn-delete-confirm"
                ><i class="bi bi-trash"></i> Ya, hapus</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <!--  MODAL PREVIEW DOKUMENTASI  -->
    <div class="modal fade" id="modalPreviewDokumentasi" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-header">
            <h5 class="modal-title" id="previewTitle">Preview Dokumentasi</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-center">
            <img
              id="previewImage"
              class="img-fluid rounded d-none"
              alt="Preview Dokumentasi"
            />
            <iframe
              id="previewPdf"
              class="w-100 d-none"
              style="height: 600px; border: none"
            >
            </iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/dokumentasi.js"></script>
  </body>
</html>
