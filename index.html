<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SIMASTA</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="login-wrapper">
      <div class="row g-0 min-vh-100">
        <!-- KOLOM KIRI - HIJAU -->
        <div
          class="col-lg-5 d-none d-lg-flex flex-column justify-content-between align-items-center text-center left-panel"
        >
          <div></div>

          <div class="brand-section">
            <img src="assets/logo.png" alt="Logo Simasta" class="brand-logo" />
          </div>

          <div class="tagline-section">
            <p class="tagline">"Kegiatan Nyata, Dampak Terukur"</p>
          </div>

          <div></div>
        </div>

        <!-- KOLOM KANAN - FORM LOGIN -->
        <div
          class="col-lg-7 d-flex flex-column align-items-center min-vh-100 right-panel"
        >
          <div
            class="flex-grow-1 d-flex align-items-center justify-content-center w-100"
          >
            <div class="form-container">
              <h1 class="signin-title mb-5">Sign In</h1>

              <form id="loginForm" novalidate method="post">
                <!-- Username -->
                <div class="mb-4">
                  <label for="username" class="form-label fw-semibold"
                    >Username</label
                  >
                  <input
                    type="text"
                    class="form-control custom-input"
                    id="username"
                    name="username"
                    placeholder="Masukkan username"
                    required
                  />
                  <div class="invalid-feedback">Username wajib diisi.</div>
                </div>

                <!-- Password -->
                <div class="mb-2">
                  <label for="password" class="form-label fw-semibold"
                    >Password</label
                  >
                  <div class="position-relative">
                    <input
                      type="password"
                      class="form-control custom-input pe-5"
                      id="password"
                      name="password"
                      placeholder="Masukkan password"
                      required
                    />
                    <i
                      class="bi bi-eye-slash toggle-password"
                      id="togglePassword"
                      aria-label="Tampilkan Password"
                      role="button"
                      tabindex="0"
                    ></i>
                  </div>
                  <div class="invalid-feedback">Password wajib diisi.</div>
                </div>

                <!-- Alert error login (sembunyi default) -->
                <div
                  class="alert alert-danger d-none mt-3 py-2"
                  id="loginError"
                  role="alert"
                >
                  <i class="bi bi-exclamation-circle me-1"></i>
                  Username atau password salah. Silakan coba lagi.
                </div>

                <!-- Lupa Password -->
                <div class="text-end mb-3 mt-2">
                  <a href="#" class="forgot-link">Lupa Password?</a>
                </div>

                <!-- Tombol Login -->
                <button type="submit" class="btn btn-login w-100">Login</button>
              </form>
            </div>
          </div>

          <footer class="footer-text">
            &copy; 2026 SIMASTA &mdash; Sistem Monitoring Kegiatan Pengabdian Masyarakat
          </footer>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
