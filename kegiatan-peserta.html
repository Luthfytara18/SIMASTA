<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kegiatan Peserta - SIMASTA</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>
  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img
            src="assets/logo-sidebar.png"
            alt="Logo Simasta"
            class="sidebar-logo-img"
          />
        </div>

        <nav class="sidebar-menu">
          <a href="dashboard.html" class="menu-item">
            <i class="bi bi-grid-fill"></i> Dashboard
          </a>
          <a href="kegiatan.html" class="menu-item">
            <i class="bi bi-calendar-event"></i> Kegiatan
          </a>
          <a href="peserta.html" class="menu-item">
            <i class="bi bi-people"></i> Peserta
          </a>
          <a href="kegiatan-peserta.html" class="menu-item active">
            <i class="bi bi-person-check"></i> Kegiatan Peserta
          </a>
          <a href="dokumentasi.html" class="menu-item">
            <i class="bi bi-image"></i> Dokumentasi
          </a>
        </nav>

        <a href="index.html" class="menu-item logout-item">
          <i class="bi bi-box-arrow-left"></i> Keluar
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- TOPBAR -->
        <div class="topbar"></div>

        <!-- TOOLBAR -->
        <div class="page-toolbar">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input
              type="text"
              id="searchKegiatanPeserta"
              placeholder="Cari nama peserta......"
            />
          </div>

          <select class="filter-select" id="filterKegiatan">
            <option value="Semua kegiatan">Memuat kegiatan...</option>
          </select>

          <button
            class="btn-add ms-auto"
            data-bs-toggle="modal"
            data-bs-target="#modalTambahPesertaKegiatan"
          >
            <i class="bi bi-plus-lg"></i> Daftarkan peserta
          </button>
        </div>

        <!-- TABEL -->
        <div class="table-card">
          <h5 class="table-title">Daftar peserta</h5>

          <table class="custom-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama peserta</th>
                <th>Kegiatan</th>
                <th>Keterangan</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="kegiatanPesertaTableBody">
              <!-- Akan diisi oleh JavaScript -->
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- MODAL TAMBAH PESERTA KE KEGIATAN -->
    <div class="modal fade" id="modalTambahPesertaKegiatan" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="modal-title-custom">Tambahkan peserta ke kegiatan</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <form
              action="php/kegiatan-peserta/proses_tambah_kegiatan_peserta.php"
              method="POST"
            >
              <
              <div class="mb-3">
                <label class="form-label-custom">Pilih kegiatan</label>
                <select
                  name="id_kegiatan"
                  class="form-control-custom"
                  id="tambahKegiatanSelect"
                  required
                >
                  <option value=""></option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Pilih peserta</label>
                <select
                  name="id_peserta"
                  class="form-control-custom"
                  id="tambahPesertaSelect"
                  required
                >
                  <option value=""></option>
                </select>
              </div>
              <div class="mb-4">
                <label class="form-label-custom">Keterangan</label>
                <input
                  type="text"
                  name="keterangan"
                  class="form-control-custom"
                  placeholder="Contoh: Panitia, Pembimbing, Peserta umum"
                />
              </div>
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn-cancel"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-save"></i> Simpan
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL EDIT KEGIATAN PESERTA UNIVERSAL -->
    <div class="modal fade" id="modalEditKP" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="modal-title-custom">Edit keterangan peserta</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <form
              action="php/kegiatan-peserta/proses_edit_kegiatan_peserta.php"
              method="POST"
            >
              <input type="hidden" name="id" id="editKPId" />
              <div class="mb-3">
                <label class="form-label-custom">Nama peserta</label>
                <input
                  type="text"
                  id="editKPNama"
                  class="form-control-custom"
                  disabled
                />
              </div>
              <div class="mb-4">
                <label class="form-label-custom">Keterangan</label>
                <input
                  type="text"
                  name="keterangan"
                  id="editKPKeterangan"
                  class="form-control-custom"
                />
              </div>
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn-cancel"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-save"></i> Simpan
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL HAPUS KEGIATAN PESERTA UNIVERSAL -->
    <div class="modal fade" id="modalHapusKP" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal text-center">
          <div class="modal-body py-4">
            <div class="hapus-icon-circle">
              <i class="bi bi-person-dash"></i>
            </div>
            <h5 class="modal-title-custom mb-2">Keluarkan peserta?</h5>
            <p class="text-muted-custom mb-4" id="hapusKPText">
              "Nama peserta" akan dikeluarkan dari kegiatan ini.
            </p>
            <div class="d-flex justify-content-center gap-2">
              <button type="button" class="btn-cancel" data-bs-dismiss="modal">
                Batal
              </button>
              <a href="#" id="hapusKPLink" class="btn-delete-confirm"
                ><i class="bi bi-trash"></i> Ya, keluarkan</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/kegiatan-peserta.js"></script>
  </body>
</html>
