<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kegiatan - SIMASTA</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>
  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img
            src="assets/logo-sidebar.png"
            alt="Logo Simasta"
            class="sidebar-logo-img"
          />
        </div>

        <nav class="sidebar-menu">
          <a href="dashboard.html" class="menu-item">
            <i class="bi bi-grid-fill"></i> Dashboard
          </a>
          <a href="kegiatan.html" class="menu-item active">
            <i class="bi bi-calendar-event"></i> Kegiatan
          </a>
          <a href="peserta.html" class="menu-item">
            <i class="bi bi-people"></i> Peserta
          </a>
          <a href="kegiatan-peserta.html" class="menu-item">
            <i class="bi bi-person-check"></i> Kegiatan Peserta
          </a>
          <a href="dokumentasi.html" class="menu-item">
            <i class="bi bi-image"></i> Dokumentasi
          </a>
        </nav>

        <a href="index.html" class="menu-item logout-item">
          <i class="bi bi-box-arrow-left"></i> Keluar
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- TOPBAR -->
        <div class="topbar"></div>

        <!-- TOOLBAR -->
        <div class="page-toolbar">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input
              type="text"
              id="searchKegiatan"
              placeholder="Cari nama kegiatan......"
            />
          </div>

          <select class="filter-select" id="filterStatus">
            <option>Semua status</option>
            <option>Terjadwal</option>
            <option>Berlangsung</option>
            <option>Selesai</option>
          </select>

          <button
            class="btn-add ms-auto"
            data-bs-toggle="modal"
            data-bs-target="#modalTambahKegiatan"
          >
            <i class="bi bi-plus-lg"></i> Tambah Kegiatan
          </button>
        </div>

        <!-- TABEL DAFTAR KEGIATAN -->
        <div class="table-card">
          <h5 class="table-title">Daftar kegiatan</h5>

          <table class="custom-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama kegiatan</th>
                <th>Tanggal mulai</th>
                <th>Lokasi</th>
                <th>Action</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="kegiatanTableBody">
              <!-- Akan diisi oleh JavaScript -->
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- MODAL TAMBAH KEGIATAN -->
    <div class="modal fade" id="modalTambahKegiatan" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="modal-title-custom">Tambah kegiatan</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <form id="formTambahKegiatan">
              <div class="mb-3">
                <label class="form-label-custom">Nama kegiatan</label>
                <input
                  type="text"
                  name="nama_kegiatan"
                  class="form-control-custom"
                  placeholder="Masukan nama kegiatan"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Deskripsi</label>
                <textarea
                  name="deskripsi"
                  class="form-control-custom"
                  rows="3"
                  placeholder="Masukan deskripsi kegiatan"
                ></textarea>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label-custom">Tanggal mulai</label>
                  <input
                    type="date"
                    name="tanggal_mulai"
                    class="form-control-custom"
                    required
                  />
                </div>
                <div class="col-6">
                  <label class="form-label-custom">Tanggal selesai</label>
                  <input
                    type="date"
                    name="tanggal_selesai"
                    class="form-control-custom"
                    required
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Lokasi</label>
                <input
                  type="text"
                  name="lokasi"
                  class="form-control-custom"
                  placeholder="Masukan lokasi kegiatan"
                  required
                />
              </div>
              <div class="mb-4">
                <label class="form-label-custom">Status</label>
                <select name="status" class="form-control-custom">
                  <option value="terjadwal">Terjadwal</option>
                  <option value="berlangsung">Berlangsung</option>
                  <option value="selesai">Selesai</option>
                </select>
              </div>
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn-cancel"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-save"></i> Simpan
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL EDIT KEGIATAN UNIVERSAL -->
    <div class="modal fade" id="modalEditKegiatan" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
          <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="modal-title-custom">Edit kegiatan</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <form action="php/kegiatan/proses_edit_kegiatan.php" method="POST">
              <input type="hidden" name="id_kegiatan" id="editKegiatanId" />
              <div class="mb-3">
                <label class="form-label-custom">Nama kegiatan</label>
                <input
                  type="text"
                  name="nama_kegiatan"
                  id="editKegiatanNama"
                  class="form-control-custom"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Deskripsi</label>
                <textarea
                  name="deskripsi"
                  id="editKegiatanDeskripsi"
                  class="form-control-custom"
                  rows="3"
                ></textarea>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label-custom">Tanggal mulai</label>
                  <input
                    type="date"
                    name="tanggal_mulai"
                    id="editKegiatanMulai"
                    class="form-control-custom"
                    required
                  />
                </div>
                <div class="col-6">
                  <label class="form-label-custom">Tanggal selesai</label>
                  <input
                    type="date"
                    name="tanggal_selesai"
                    id="editKegiatanSelesai"
                    class="form-control-custom"
                    required
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Lokasi</label>
                <input
                  type="text"
                  name="lokasi"
                  id="editKegiatanLokasi"
                  class="form-control-custom"
                  required
                />
              </div>
              <div class="mb-4">
                <label class="form-label-custom">Status</label>
                <select
                  name="status"
                  id="editKegiatanStatus"
                  class="form-control-custom"
                >
                  <option value="terjadwal">Terjadwal</option>
                  <option value="berlangsung">Berlangsung</option>
                  <option value="selesai">Selesai</option>
                </select>
              </div>
              <div class="d-flex justify-content-end gap-2">
                <button
                  type="button"
                  class="btn-cancel"
                  data-bs-dismiss="modal"
                >
                  Batal
                </button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-save"></i> Simpan
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL HAPUS KEGIATAN UNIVERSAL -->
    <div class="modal fade" id="modalHapusKegiatan" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal text-center">
          <div class="modal-body py-4">
            <div class="hapus-icon-circle"><i class="bi bi-trash"></i></div>
            <h5 class="modal-title-custom mb-2">Hapus kegiatan?</h5>
            <p class="text-muted-custom mb-4" id="hapusKegiatanText">
              "Nama kegiatan" akan dihapus permanen.
            </p>
            <div class="d-flex justify-content-center gap-2">
              <button type="button" class="btn-cancel" data-bs-dismiss="modal">
                Batal
              </button>
              <a href="#" id="hapusKegiatanLink" class="btn-delete-confirm"
                ><i class="bi bi-trash"></i> Ya, hapus</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/kegiatan.js"></script>
  </body>
</html>
